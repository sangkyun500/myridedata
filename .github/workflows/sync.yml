name: garmin-sync

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install garminconnect garth
      - name: Pull Garmin data
        env:
          GARTH_TOKEN: ${{ secrets.GARTH_TOKEN }}
        run: python sync.py
      - name: Commit results
        run: |
          git config user.name "garmin-sync-bot"
          git config user.email "actions@github.com"
          git add garmin_rides.csv summary.txt
          git diff --cached --quiet || git commit -m "data: $(date +%F)"
          git push
